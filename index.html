<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitMatch Pro - Automated Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1f 0%, #0f172a 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 32px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        .btn-secondary {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
            padding: 12px 32px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .gradient-text {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .hidden { display: none; }
        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #10b981;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">
    <div class="glass-card max-w-md w-full p-8 text-center">
        <div class="mb-6">
            <div class="w-20 h-20 rounded-full bg-gradient-to-r from-green-400 to-blue-500 mx-auto mb-4 flex items-center justify-center text-3xl">
                🤖
            </div>
            <h1 class="text-3xl font-bold gradient-text mb-2">DigitMatch Pro</h1>
            <p class="text-gray-400">Automated Trading Bot for Deriv</p>
        </div>

        <div id="loginSection">
            <button id="loginBtn" class="btn-primary w-full mb-4">
                🔐 Login with Deriv
            </button>
            <button id="signupBtn" class="btn-secondary w-full mb-4">
                📝 Sign Up with Deriv
            </button>
            <button id="affiliateBtn" class="w-full py-2 px-4 bg-gray-700 hover:bg-gray-600 rounded-lg text-white transition">
                🔗 Create Deriv Account (Affiliate)
            </button>
        </div>

        <div id="accessSection" class="hidden">
            <button id="accessBtn" class="btn-primary w-full mb-4">
                🚀 Launch Trading Bot
            </button>
            <button id="logoutBtn" class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 rounded-lg text-white transition">
                🔓 Logout
            </button>
        </div>

        <div class="mt-6 text-xs text-gray-500">
            <p>🔒 Secure OAuth2.0 with PKCE</p>
            <p class="mt-2 text-red-400">⚠️ Trading involves risk. Only trade what you can afford to lose.</p>
        </div>
    </div>

    <script>
        // ============================================
        // DERIV OAUTH 2.0 WITH PKCE
        // Based on official documentation
        // ============================================
        
        // Your Client ID from Deriv Dashboard
        const CLIENT_ID = '33rp9Oy3CuZ2io6XAuLZ6';
        const BOT_PAGE = 'bot-obfuscated.html';
        const AFFILIATE_LINK = 'https://track.deriv.com/_0rfpRaHuZeFMjdsyM5hasGNd7ZgqdRLk/1/';
        
        // Redirect URI - MUST match exactly what's registered in your app
        const REDIRECT_URI = window.location.origin + window.location.pathname;
        
        // OAuth endpoints
        const AUTH_URL = 'https://auth.deriv.com/oauth2/auth';
        
        // Generate PKCE code verifier and challenge
        async function generatePKCE() {
            // Generate random code_verifier (43-128 characters)
            const array = crypto.getRandomValues(new Uint8Array(64));
            const codeVerifier = Array.from(array)
                .map(v => 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789-._~'[v % 66])
                .join('');
            
            // Generate code_challenge (SHA-256 of code_verifier, base64url encoded)
            const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(codeVerifier));
            const codeChallenge = btoa(String.fromCharCode(...new Uint8Array(hash)))
                .replace(/\+/g, '-')
                .replace(/\//g, '_')
                .replace(/=+$/, '');
            
            // Generate random state for CSRF protection
            const state = crypto.getRandomValues(new Uint8Array(16))
                .reduce((s, b) => s + b.toString(16).padStart(2, '0'), '');
            
            return { codeVerifier, codeChallenge, state };
        }
        
        // Store PKCE values
        function storePKCEValues(codeVerifier, state) {
            sessionStorage.setItem('pkce_code_verifier', codeVerifier);
            sessionStorage.setItem('oauth_state', state);
            sessionStorage.setItem('oauth_start_time', Date.now().toString());
        }
        
        // Get stored PKCE values
        function getStoredPKCEValues() {
            return {
                codeVerifier: sessionStorage.getItem('pkce_code_verifier'),
                state: sessionStorage.getItem('oauth_state')
            };
        }
        
        // Clear PKCE values
        function clearPKCEValues() {
            sessionStorage.removeItem('pkce_code_verifier');
            sessionStorage.removeItem('oauth_state');
            sessionStorage.removeItem('oauth_start_time');
        }
        
        // Login with Deriv
        async function loginWithDeriv() {
            try {
                // Generate PKCE parameters
                const { codeVerifier, codeChallenge, state } = await generatePKCE();
                storePKCEValues(codeVerifier, state);
                
                // Build authorization URL
                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    redirect_uri: REDIRECT_URI,
                    scope: 'trade account_manage',
                    state: state,
                    code_challenge: codeChallenge,
                    code_challenge_method: 'S256'
                });
                
                const authUrl = `${AUTH_URL}?${params.toString()}`;
                
                console.log('🔐 Redirecting to Deriv OAuth...');
                console.log('Client ID:', CLIENT_ID);
                console.log('Redirect URI:', REDIRECT_URI);
                console.log('Auth URL:', authUrl);
                
                window.location.href = authUrl;
            } catch (error) {
                console.error('Login error:', error);
                alert('Failed to initialize login. Please try again.');
            }
        }
        
        // Sign up with Deriv (includes prompt=registration)
        async function signUpWithDeriv() {
            try {
                const { codeVerifier, codeChallenge, state } = await generatePKCE();
                storePKCEValues(codeVerifier, state);
                
                const params = new URLSearchParams({
                    response_type: 'code',
                    client_id: CLIENT_ID,
                    redirect_uri: REDIRECT_URI,
                    scope: 'trade account_manage',
                    state: state,
                    code_challenge: codeChallenge,
                    code_challenge_method: 'S256',
                    prompt: 'registration'
                });
                
                // Add affiliate tracking parameters
                params.append('t', 'DigitMatchPro');
                params.append('utm_source', 'digitmatchstar');
                params.append('utm_medium', 'affiliate');
                params.append('utm_campaign', 'trading_bot');
                
                const authUrl = `${AUTH_URL}?${params.toString()}`;
                
                console.log('📝 Redirecting to Deriv Sign Up...');
                console.log('Sign Up URL:', authUrl);
                
                window.location.href = authUrl;
            } catch (error) {
                console.error('Signup error:', error);
                alert('Failed to initialize signup. Please try again.');
            }
        }
        
        // Exchange authorization code for access token
        async function exchangeCodeForToken(code, codeVerifier) {
            const tokenUrl = 'https://auth.deriv.com/oauth2/token';
            
            const params = new URLSearchParams({
                grant_type: 'authorization_code',
                client_id: CLIENT_ID,
                code: code,
                code_verifier: codeVerifier,
                redirect_uri: REDIRECT_URI
            });
            
            try {
                const response = await fetch(tokenUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/x-www-form-urlencoded',
                    },
                    body: params.toString()
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`Token exchange failed: ${response.status} - ${errorText}`);
                }
                
                const data = await response.json();
                console.log('✅ Token exchange successful');
                return data.access_token;
            } catch (error) {
                console.error('Token exchange error:', error);
                throw error;
            }
        }
        
        // Handle OAuth callback
        async function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const code = urlParams.get('code');
            const state = urlParams.get('state');
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');
            
            if (error) {
                console.error('OAuth Error:', error, errorDescription);
                showMessage(`Authentication failed: ${errorDescription || error}`, true);
                window.history.replaceState({}, document.title, window.location.pathname);
                return false;
            }
            
            if (code) {
                console.log('📝 Authorization code received');
                
                // Verify state
                const storedValues = getStoredPKCEValues();
                if (!storedValues.state || storedValues.state !== state) {
                    console.error('State mismatch! Possible CSRF attack');
                    showMessage('Security validation failed. Please try again.', true);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    clearPKCEValues();
                    return false;
                }
                
                if (!storedValues.codeVerifier) {
                    console.error('No code verifier found');
                    showMessage('Session expired. Please try again.', true);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return false;
                }
                
                showMessage('Exchanging code for token...', false);
                
                try {
                    // Exchange code for access token
                    const accessToken = await exchangeCodeForToken(code, storedValues.codeVerifier);
                    
                    console.log('✅ Access token obtained');
                    
                    // Store the token
                    localStorage.setItem('access_token', accessToken);
                    localStorage.setItem('active_token', accessToken);
                    localStorage.setItem('oauth_authorized', 'true');
                    localStorage.setItem('token_timestamp', Date.now().toString());
                    localStorage.setItem('token_source', 'oauth_pkce');
                    
                    // Clear PKCE values
                    clearPKCEValues();
                    
                    showMessage('✅ Login successful! Redirecting to bot...', false);
                    
                    // Redirect to bot
                    setTimeout(() => {
                        window.location.href = BOT_PAGE;
                    }, 1500);
                    
                    return true;
                } catch (error) {
                    console.error('Token exchange failed:', error);
                    showMessage('Failed to complete authentication. Please try again.', true);
                    window.history.replaceState({}, document.title, window.location.pathname);
                    clearPKCEValues();
                    return false;
                }
            }
            
            return false;
        }
        
        function showMessage(message, isError = false) {
            let msgDiv = document.getElementById('tempMessage');
            if (!msgDiv) {
                msgDiv = document.createElement('div');
                msgDiv.id = 'tempMessage';
                msgDiv.className = 'fixed top-20 left-1/2 transform -translate-x-1/2 z-50 p-3 rounded-lg shadow-lg transition-all duration-300';
                document.body.appendChild(msgDiv);
            }
            
            const bgColor = isError ? 'bg-red-500' : 'bg-green-500';
            msgDiv.className = `fixed top-20 left-1/2 transform -translate-x-1/2 z-50 p-3 rounded-lg shadow-lg ${bgColor} text-white text-sm`;
            msgDiv.textContent = message;
            msgDiv.classList.remove('hidden');
            
            setTimeout(() => {
                msgDiv.classList.add('hidden');
            }, 3000);
        }
        
        function checkExistingAuthorization() {
            const token = localStorage.getItem('active_token');
            const isAuthorized = localStorage.getItem('oauth_authorized');
            const timestamp = localStorage.getItem('token_timestamp');
            
            const isExpired = timestamp && (Date.now() - parseInt(timestamp) > 24 * 60 * 60 * 1000);
            
            if (token && isAuthorized === 'true' && !isExpired) {
                console.log('✅ Found valid existing token');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('accessSection').classList.remove('hidden');
                return true;
            } else if (isExpired) {
                localStorage.removeItem('active_token');
                localStorage.removeItem('oauth_authorized');
                localStorage.removeItem('token_timestamp');
                console.log('⚠️ Token expired');
            }
            return false;
        }
        
        function logout() {
            localStorage.removeItem('active_token');
            localStorage.removeItem('oauth_authorized');
            localStorage.removeItem('token_timestamp');
            localStorage.removeItem('deriv_accounts');
            clearPKCEValues();
            showMessage('Logged out successfully', false);
            setTimeout(() => {
                document.getElementById('loginSection').classList.remove('hidden');
                document.getElementById('accessSection').classList.add('hidden');
            }, 1000);
        }
        
        function launchBot() {
            const token = localStorage.getItem('active_token');
            if (!token) {
                showMessage('Please login first', true);
                return;
            }
            window.location.href = BOT_PAGE;
        }
        
        function affiliateSignUp() {
            window.open(AFFILIATE_LINK, '_blank');
        }
        
        // Initialize
        (async function init() {
            console.log('🚀 DigitMatch Pro Landing Page');
            console.log('Client ID:', CLIENT_ID);
            console.log('Redirect URI:', REDIRECT_URI);
            
            // Handle OAuth callback first
            const isCallback = await handleOAuthCallback();
            
            if (!isCallback) {
                // Setup UI
                document.getElementById('loginBtn').onclick = loginWithDeriv;
                document.getElementById('signupBtn').onclick = signUpWithDeriv;
                document.getElementById('affiliateBtn').onclick = affiliateSignUp;
                document.getElementById('accessBtn').onclick = launchBot;
                document.getElementById('logoutBtn').onclick = logout;
                
                checkExistingAuthorization();
            } else {
                // Clear URL parameters
                window.history.replaceState({}, document.title, window.location.pathname);
            }
        })();
    </script>
</body>
</html>
