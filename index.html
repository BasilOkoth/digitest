<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DigitMatch Pro - Automated Trading Bot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #0a0f1f 0%, #0f172a 100%);
            min-height: 100vh;
            font-family: 'Inter', sans-serif;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
        }
        .btn-primary {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            padding: 12px 32px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(16, 185, 129, 0.3);
        }
        .gradient-text {
            background: linear-gradient(135deg, #10b981, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
        }
        .status-connected { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .status-disconnected { background: #ef4444; }
    </style>
</head>
<body class="flex items-center justify-center p-4">
    <div class="glass-card max-w-md w-full p-8 text-center">
        <div class="mb-6">
            <div class="w-20 h-20 rounded-full bg-gradient-to-r from-green-400 to-blue-500 mx-auto mb-4 flex items-center justify-center text-3xl">
                🤖
            </div>
            <h1 class="text-3xl font-bold gradient-text mb-2">DigitMatch Pro</h1>
            <p class="text-gray-400">Automated Trading Bot for Deriv</p>
        </div>

        <!-- Status Message -->
        <div id="statusMsg" class="mb-4 p-3 rounded-lg hidden"></div>

        <div id="loginSection">
            <button id="loginBtn" class="btn-primary w-full mb-4">
                🔐 Login with Deriv
            </button>
            <button id="affiliateBtn" class="w-full py-2 px-4 bg-gray-700 hover:bg-gray-600 rounded-lg text-white transition">
                📝 Create Deriv Account
            </button>
        </div>

        <div id="accessSection" class="hidden">
            <button id="accessBtn" class="btn-primary w-full mb-4">
                🚀 Access Bot
            </button>
            <button id="logoutBtn" class="w-full py-2 px-4 bg-red-600 hover:bg-red-700 rounded-lg text-white transition">
                🔓 Logout
            </button>
        </div>

        <div class="mt-6 text-xs text-gray-500">
            <p>🔒 Secure OAuth2.0 Authentication</p>
            <p class="mt-2 text-red-400">⚠️ Trading involves risk. Only trade what you can afford to lose.</p>
        </div>
    </div>

    <script>
        // ============================================
        // CORRECT OAUTH CONFIGURATION
        // ============================================
        
        const APP_ID = '33rp9Oy3CuZ2io6XAuLZ6';
        const BOT_PAGE = 'bot-obfuscated.html';
        const AFFILIATE_LINK = 'https://track.deriv.com/_0rfpRaHuZeFMjdsyM5hasGNd7ZgqdRLk/1/';
        
        // IMPORTANT: This MUST be the EXACT URL of this page
        // Since your site is https://www.digitmatchstar.com/
        const REDIRECT_URI = 'https://www.digitmatchstar.com/index.html';
        
        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('statusMsg');
            statusDiv.textContent = message;
            statusDiv.className = `mb-4 p-3 rounded-lg ${isError ? 'bg-red-900/50 text-red-300' : 'bg-green-900/50 text-green-300'}`;
            statusDiv.classList.remove('hidden');
            setTimeout(() => {
                statusDiv.classList.add('hidden');
            }, 5000);
        }

        function loginWithDeriv() {
            // Encode the redirect URI
            const encodedRedirectUri = encodeURIComponent(REDIRECT_URI);
            
            // Build the OAuth URL with ALL required parameters
            const oauthUrl = `https://oauth.deriv.com/oauth2/authorize?app_id=${APP_ID}&l=en&brand=deriv&scope=read%20trade%20payments&redirect_uri=${encodedRedirectUri}&response_type=code`;
            
            console.log('🔐 Redirecting to Deriv OAuth...');
            console.log('📱 App ID:', APP_ID);
            console.log('🔗 Redirect URI:', REDIRECT_URI);
            console.log('🌐 Full URL:', oauthUrl);
            
            // Store the redirect URI for debugging
            localStorage.setItem('oauth_redirect_uri', REDIRECT_URI);
            localStorage.setItem('oauth_start_time', Date.now().toString());
            
            // Redirect to Deriv
            window.location.href = oauthUrl;
        }

        function signUpNewUser() {
            window.open(AFFILIATE_LINK, '_blank');
        }

        // Handle OAuth callback
        function handleOAuthCallback() {
            const urlParams = new URLSearchParams(window.location.search);
            const token1 = urlParams.get('token1');
            const code = urlParams.get('code');
            const error = urlParams.get('error');
            const errorDescription = urlParams.get('error_description');
            
            console.log('🔍 Processing OAuth callback...');
            console.log('URL Parameters:', window.location.search);
            
            if (error) {
                console.error('OAuth Error:', error, errorDescription);
                showStatus(`Login failed: ${errorDescription || error}`, true);
                // Clear URL parameters
                window.history.replaceState({}, document.title, window.location.pathname);
                return false;
            }
            
            if (token1) {
                console.log('✅ Token received!');
                showStatus('✅ Login successful! Redirecting to bot...', false);
                
                // Save all accounts
                const accounts = [];
                for (let i = 1; urlParams.get('acct' + i); i++) {
                    accounts.push({
                        account: urlParams.get('acct' + i),
                        token: urlParams.get('token' + i),
                        currency: urlParams.get('cur' + i)
                    });
                    console.log(`📊 Account ${i}:`, urlParams.get('acct' + i));
                }
                
                // Save to localStorage
                localStorage.setItem('deriv_accounts', JSON.stringify(accounts));
                localStorage.setItem('active_token', token1);
                localStorage.setItem('oauth_authorized', 'true');
                localStorage.setItem('token_timestamp', Date.now().toString());
                
                console.log('💾 Token saved, redirecting to bot:', BOT_PAGE);
                
                // Redirect to bot page
                setTimeout(() => {
                    window.location.href = BOT_PAGE;
                }, 1000);
                return true;
            }
            
            // Check if we have a code parameter (authorization code flow)
            if (code) {
                console.log('📝 Authorization code received:', code);
                // You would need to exchange code for token via your backend
                // For now, show message
                showStatus('Please complete login from the bot page.', false);
            }
            
            return false;
        }

        function checkExistingAuthorization() {
            const token = localStorage.getItem('active_token');
            const isAuthorized = localStorage.getItem('oauth_authorized');
            const timestamp = localStorage.getItem('token_timestamp');
            
            // Check if token exists and is not expired (24 hours)
            const isExpired = timestamp && (Date.now() - parseInt(timestamp) > 24 * 60 * 60 * 1000);
            
            if (token && isAuthorized === 'true' && !isExpired) {
                console.log('✅ Found valid existing token');
                document.getElementById('loginSection').classList.add('hidden');
                document.getElementById('accessSection').classList.remove('hidden');
                return true;
            } else if (isExpired) {
                // Clear expired token
                localStorage.removeItem('active_token');
                localStorage.removeItem('oauth_authorized');
                localStorage.removeItem('token_timestamp');
                console.log('⚠️ Token expired, please login again');
                showStatus('Session expired. Please login again.', true);
            }
            return false;
        }

        function logout() {
            localStorage.removeItem('active_token');
            localStorage.removeItem('oauth_authorized');
            localStorage.removeItem('token_timestamp');
            localStorage.removeItem('deriv_accounts');
            localStorage.removeItem('oauth_redirect_uri');
            showStatus('Logged out successfully', false);
            setTimeout(() => {
                location.reload();
            }, 1000);
        }

        // Process OAuth callback FIRST
        const isCallback = handleOAuthCallback();
        
        if (!isCallback) {
            // Setup UI event listeners
            const loginBtn = document.getElementById('loginBtn');
            const affiliateBtn = document.getElementById('affiliateBtn');
            const accessBtn = document.getElementById('accessBtn');
            const logoutBtn = document.getElementById('logoutBtn');
            
            if (loginBtn) loginBtn.onclick = loginWithDeriv;
            if (affiliateBtn) affiliateBtn.onclick = signUpNewUser;
            if (accessBtn) accessBtn.onclick = () => window.location.href = BOT_PAGE;
            if (logoutBtn) logoutBtn.onclick = logout;
            
            checkExistingAuthorization();
        }
        
        // Log the current configuration for debugging
        console.log('🚀 Page loaded');
        console.log('📍 Current URL:', window.location.href);
        console.log('🔗 Redirect URI configured:', REDIRECT_URI);
        console.log('📱 App ID:', APP_ID);
    </script>
</body>
</html>
